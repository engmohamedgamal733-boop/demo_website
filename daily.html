<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 رسائل يومية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="daily-page">
    <!-- ═══════ الشريط العلوي ═══════ -->
    <div class="top-banner">
        أنا مش هسيب بنوتي ❤️🫂
    </div>

    <div class="stars"></div>
    
    <nav class="navbar">
        <a href="home.html" class="logo">💕 بيتنا</a>
        <ul class="nav-links">
            <li><a href="home.html">الرئيسية</a></li>
            <li><a href="why.html">ليه الموقع ده؟</a></li>
            <li><a href="memories.html">ذكرياتنا</a></li>
            <li><a href="daily.html" class="active">رسائل يومية</a></li>
            <li><a href="questions.html">اسأليني</a></li>
        </ul>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </nav>

    <main class="main-content">
        <h1 class="page-title">🎁 رسائل يومية</h1>
        <p class="page-subtitle">كل يوم بيفتح فولدر جديد فيه مفاجأة ليكي 💕</p>
        
        <!-- Back Button -->
        <div class="back-section">
            <a href="home.html" class="back-btn">
                ← رجوع للرئيسية
            </a>
        </div>

        <div class="folders-container" id="folders-container">
            <!-- Folders will be generated by JavaScript -->
        </div>
    </main>

    <!-- Audio Player Modal -->
    <div id="audio-modal" class="modal hidden">
        <div class="modal-content audio-modal-content">
            <button class="close-modal" onclick="closeModal()" title="إغلاق">✕</button>
            
            <div class="day-header">
                <span class="day-number" id="modal-day"></span>
                <span class="day-date" id="modal-date"></span>
            </div>
            
            <div class="message-container">
                <p class="day-message" id="modal-message"></p>
            </div>
            
            <div class="audio-player">
                <audio id="audio-element" preload="metadata"></audio>
                
                <div class="waveform">
                    <span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                
                <div class="player-main-controls">
                    <button class="skip-btn" onclick="skipAudio(-10)" title="رجوع 10 ثواني">
                        ⏪
                    </button>
                    <button class="play-btn" onclick="togglePlay()" title="تشغيل/إيقاف">
                        <span id="play-icon">▶️</span>
                    </button>
                    <button class="skip-btn" onclick="skipAudio(10)" title="تقديم 10 ثواني">
                        ⏩
                    </button>
                </div>
                
                <div class="progress-section-player">
                    <span class="time-label" id="current-time">0:00</span>
                    <div class="progress-wrapper">
                        <div class="progress-container">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>
                        <input type="range" 
                               id="audio-slider" 
                               class="audio-slider" 
                               min="0" 
                               max="100" 
                               value="0" 
                               step="0.01">
                    </div>
                    <span class="time-label" id="duration">0:00</span>
                </div>
                
                <div class="player-extra-controls">
                    <div class="volume-control">
                        <button onclick="toggleMute()" id="volume-icon" title="كتم الصوت">
                            🔊
                        </button>
                        <input type="range" 
                               id="volume-slider" 
                               class="volume-slider" 
                               min="0" 
                               max="1" 
                               step="0.05" 
                               value="1">
                    </div>
                    
                    <button class="speed-btn" id="speed-btn" onclick="changeSpeed()" title="سرعة التشغيل">
                        1x
                    </button>
                </div>
                
                <button class="download-btn" id="download-btn" title="تحميل التسجيل">
                    ⬇️ حملي التسجيل
                </button>
            </div>
            
            <div class="modal-navigation">
                <a href="questions.html" class="nav-link-btn">
                    💭 روحي للأسئلة
                </a>
                <a href="home.html" class="nav-link-btn primary">
                    🏠 الرئيسية
                </a>
            </div>
        </div>
    </div>

    <!-- Fixed Home Button -->
    <a href="home.html" class="fixed-back-btn" title="الرئيسية">
        🏠
    </a>

    <script src="js/main.js"></script>
    <script src="js/daily.js"></script>
</body>
</html>
