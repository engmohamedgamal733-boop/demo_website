<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 رسائل يومية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="daily-page">
    <nav class="navbar">
        <div class="logo">💕 بيتنا</div>
        <ul class="nav-links">
            <li><a href="home.html">الرئيسية</a></li>
            <li><a href="why.html">ليه الموقع ده؟</a></li>
            <li><a href="memories.html">ذكرياتنا</a></li>
            <li><a href="daily.html" class="active">رسائل يومية</a></li>
            <li><a href="questions.html">اسأليني</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1 class="page-title">🎁 رسائل يومية</h1>
        <p class="page-subtitle">كل يوم بيفتح فولدر جديد فيه مفاجأة ليكي 💕</p>

        <div class="folders-container" id="folders-container">
            <!-- Folders will be generated by JavaScript -->
        </div>
    </main>

    <!-- Audio Player Modal -->
    <div id="audio-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div class="day-header">
                <span class="day-number" id="modal-day"></span>
                <span class="day-date" id="modal-date"></span>
            </div>
            <p class="day-message" id="modal-message"></p>
            
            <div class="audio-player">
                <audio id="audio-element" preload="metadata"></audio>
                <div class="player-controls">
                    <button class="play-btn" onclick="togglePlay()">
                        <span id="play-icon">▶️</span>
                    </button>
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <span class="time-display" id="time-display">0:00 / 0:00</span>
                </div>
                <button class="download-btn" id="download-btn">
                    ⬇️ حملي التسجيل
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/daily.js"></script>
</body>
</html>
