<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 مرحباً يا قمر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="stars"></div>
    <div class="floating-hearts">
        <span>💕</span><span>💖</span><span>💝</span><span>💗</span><span>💕</span>
    </div>
    
    <div class="login-container">
        <div class="welcome-text">
            <h1>أهلاً يا قمري 🌙</h1>
            <p>الموقع ده معمول مخصوص عشانك أنتِ بس 💕</p>
        </div>
        
        <div class="password-section">
            <label for="password">دخلي كلمة السر 🔐</label>
            <input type="password" id="password" placeholder="✨ اكتبي هنا ✨">
            <button onclick="checkPassword()" class="btn-primary">
                ادخلي 💖
            </button>
            <p id="error-msg" class="error-msg"></p>
        </div>
        
        <div class="hint-section">
            <button onclick="showHint()" class="btn-hint">
                محتاجة مساعدة؟ 🤔
            </button>
            <div id="hints-container" class="hints-container hidden">
                <p class="hint-title">وسيلة مساعدة 💡</p>
                <div id="hint-text"></div>
                <button onclick="nextHint()" class="btn-small">تلميح تاني</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
