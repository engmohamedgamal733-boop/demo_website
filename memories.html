<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 ذكرياتنا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ═══════════════════════════════════════════════════════════ */
        /*                    CSS Variables                            */
        /* ═══════════════════════════════════════════════════════════ */
        :root {
            --primary-color: #e91e63;
            --primary-light: #f8bbd9;
            --primary-dark: #c2185b;
            --secondary-color: #9c27b0;
            --gold: #ffd700;
            --text-muted: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Top Banner                               */
        /* ═══════════════════════════════════════════════════════════ */
        .top-banner {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Navbar                                   */
        /* ═══════════════════════════════════════════════════════════ */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: var(--primary-color);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Main Content                             */
        /* ═══════════════════════════════════════════════════════════ */
        .main-content {
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            font-family: 'Aref Ruqaa', serif;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Back Button                              */
        /* ═══════════════════════════════════════════════════════════ */
        .back-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--primary-color);
            transform: translateX(-5px);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Stats Section                            */
        /* ═══════════════════════════════════════════════════════════ */
        .memories-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Filter Buttons                           */
        /* ═══════════════════════════════════════════════════════════ */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 25px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Memories Grid                            */
        /* ═══════════════════════════════════════════════════════════ */
        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Memory Card                              */
        /* ═══════════════════════════════════════════════════════════ */
        .memory-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .memory-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-light);
            box-shadow: 0 15px 40px rgba(233, 30, 99, 0.25);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Memory Media                             */
        /* ═══════════════════════════════════════════════════════════ */
        .memory-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16/12;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .memory-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .memory-card:hover .memory-media img {
            transform: scale(1.05);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Media Placeholders                       */
        /* ═══════════════════════════════════════════════════════════ */
        .video-placeholder,
        .audio-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(233,30,99,0.3), rgba(156,39,176,0.3));
        }

        .video-placeholder span,
        .audio-placeholder span {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .audio-placeholder {
            background: linear-gradient(135deg, rgba(103,58,183,0.3), rgba(63,81,181,0.3));
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Click Overlay                            */
        /* ═══════════════════════════════════════════════════════════ */
        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .memory-card:hover .click-overlay {
            opacity: 1;
        }

        .click-overlay span {
            font-size: 3.5rem;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .memory-card:hover .click-overlay span {
            transform: scale(1.1);
        }

        .video-placeholder + .click-overlay,
        .audio-placeholder + .click-overlay {
            opacity: 1;
            background: rgba(0, 0, 0, 0.2);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Type Badge                               */
        /* ═══════════════════════════════════════════════════════════ */
        .memory-type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Text Only Card                           */
        /* ═══════════════════════════════════════════════════════════ */
        .memory-card.text-only {
            background: linear-gradient(135deg, rgba(233,30,99,0.15), rgba(156,39,176,0.15));
        }

        .memory-card.text-only .memory-info {
            padding: 25px;
        }

        .text-card-icon {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        }

        .text-card-icon span {
            font-size: 3rem;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Memory Info                              */
        /* ═══════════════════════════════════════════════════════════ */
        .memory-info {
            padding: 20px;
        }

        .memory-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 15px;
        }

        .memory-emoji {
            font-size: 2.5rem;
            line-height: 1;
        }

        .memory-meta {
            flex: 1;
        }

        .memory-date {
            display: inline-block;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .memory-title {
            font-size: 1.3rem;
            color: var(--primary-light);
            font-family: 'Aref Ruqaa', serif;
            line-height: 1.4;
        }

        .memory-description {
            color: var(--text-muted);
            line-height: 1.9;
            font-size: 1.05rem;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Empty State                              */
        /* ═══════════════════════════════════════════════════════════ */
        .memories-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .memories-empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .memories-empty h3 {
            margin-bottom: 10px;
            color: white;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    LIGHTBOX                                 */
        /* ═══════════════════════════════════════════════════════════ */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-container {
            position: relative;
            max-width: 95vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            left: 10px;
            background: var(--primary-color);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .lightbox-close:hover {
            background: var(--primary-dark);
            transform: rotate(90deg) scale(1.1);
        }

        .lightbox-external {
            position: absolute;
            top: -50px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Tajawal', sans-serif;
        }

        .lightbox-external:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-media {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lightbox-media img {
            max-width: 90vw;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 15px;
        }

        .lightbox-media video {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 15px;
            background: black;
        }

        .lightbox-media iframe {
            width: 90vw;
            max-width: 900px;
            height: 60vh;
            border: none;
            border-radius: 15px;
        }

        /* Audio Container in Lightbox */
        .lightbox-audio-container {
            background: linear-gradient(135deg, rgba(103,58,183,0.5), rgba(63,81,181,0.5));
            padding: 60px 80px;
            border-radius: 20px;
            text-align: center;
            min-width: 350px;
        }

        .lightbox-audio-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .lightbox-audio-container iframe {
            border-radius: 10px;
            max-width: 100%;
        }

        .lightbox-info {
            text-align: center;
            margin-top: 25px;
            max-width: 600px;
        }

        .lightbox-title {
            font-size: 1.5rem;
            color: var(--primary-light);
            margin-bottom: 10px;
            font-family: 'Aref Ruqaa', serif;
        }

        .lightbox-description {
            color: var(--text-muted);
            line-height: 1.8;
        }

        .lightbox-date {
            display: inline-block;
            background: var(--primary-color);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Fixed Home Button                        */
        /* ═══════════════════════════════════════════════════════════ */
        .fixed-back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 55px;
            height: 55px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .fixed-back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.6);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Stars Background                         */
        /* ═══════════════════════════════════════════════════════════ */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, white, transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 230px 80px, white, transparent);
            background-size: 250px 250px;
            animation: twinkle 5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ═══════════════════════════════════════════════════════════ */
        /*                    Responsive                               */
        /* ═══════════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(0, 0, 0, 0.95);
                flex-direction: column;
                padding: 20px;
                gap: 10px;
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }

            .memories-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .filter-buttons {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }

            .memories-stats {
                gap: 10px;
            }

            .stat-item {
                padding: 12px 18px;
            }

            .stat-number {
                font-size: 1.5rem;
            }

            .memory-emoji {
                font-size: 2rem;
            }

            .fixed-back-btn {
                bottom: 20px;
                left: 20px;
                width: 50px;
                height: 50px;
            }

            /* Lightbox Responsive */
            .lightbox-close {
                top: -45px;
                left: 5px;
                width: 40px;
                height: 40px;
            }

            .lightbox-external {
                top: -45px;
                right: 5px;
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            .lightbox-audio-container {
                padding: 40px 30px;
                min-width: 280px;
            }

            .lightbox-audio-icon {
                font-size: 4rem;
            }

            .lightbox-title {
                font-size: 1.2rem;
            }

            .lightbox-media iframe {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <!-- ═══════ الشريط العلوي ═══════ -->
    <div class="top-banner">
        ❤️ أنا مش هسيب بنوتي 🫂
    </div>

    <!-- ═══════ النجوم ═══════ -->
    <div class="stars"></div>

    <!-- ═══════ شريط التنقل ═══════ -->
    <nav class="navbar">
        <a href="home.html" class="logo">💕 بيتنا</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="home.html">الرئيسية</a></li>
            <li><a href="why.html">ليه الموقع ده؟</a></li>
            <li><a href="memories.html" class="active">ذكرياتنا</a></li>
            <li><a href="daily.html">رسائل يومية</a></li>
            <li><a href="questions.html">اسأليني</a></li>
        </ul>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </nav>

    <!-- ═══════ المحتوى الرئيسي ═══════ -->
    <main class="main-content">
        <h1 class="page-title">📸 ذكرياتنا الحلوة</h1>
        <p class="page-subtitle">لحظات مش هننساها أبداً ♥️</p>

        <!-- زر الرجوع -->
        <div class="back-section">
            <a href="home.html" class="back-btn">← رجوع للرئيسية</a>
        </div>

        <!-- الإحصائيات -->
        <div class="memories-stats" id="memoriesStats"></div>

        <!-- أزرار الفلترة -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all" onclick="filterMemories('all', this)">
                🌟 الكل
            </button>
            <button class="filter-btn" data-filter="image" onclick="filterMemories('image', this)">
                📷 صور
            </button>
            <button class="filter-btn" data-filter="video" onclick="filterMemories('video', this)">
                🎬 فيديوهات
            </button>
            <button class="filter-btn" data-filter="audio" onclick="filterMemories('audio', this)">
                🎵 تسجيلات
            </button>
            <button class="filter-btn" data-filter="text" onclick="filterMemories('text', this)">
                📝 كلام
            </button>
        </div>

        <!-- شبكة الذكريات -->
        <div class="memories-grid" id="memoriesGrid"></div>
    </main>

    <!-- ═══════ LIGHTBOX ═══════ -->
    <div class="lightbox" id="lightbox" onclick="closeLightboxOnOverlay(event)">
        <div class="lightbox-container" onclick="event.stopPropagation()">
            <button class="lightbox-close" onclick="closeLightbox()">✕</button>
            <a class="lightbox-external" id="lightboxExternal" href="#" target="_blank">
                🔗 فتح في تاب جديد
            </a>
            <div class="lightbox-media" id="lightboxMedia"></div>
            <div class="lightbox-info" id="lightboxInfo"></div>
        </div>
    </div>

    <!-- زر العودة الثابت -->
    <a href="home.html" class="fixed-back-btn" title="الرئيسية">🏠</a>

    <!-- ملف البيانات -->
    <script src="memories/data.js"></script>

    <script>
        // ═══════════════════════════════════════════════════════════
        //                    Toggle Menu
        // ═══════════════════════════════════════════════════════════
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        // ═══════════════════════════════════════════════════════════
        //                    Helper Functions
        // ═══════════════════════════════════════════════════════════
        function getExternalLink(memory) {
            if (memory.driveId) {
                return `https://drive.google.com/file/d/${memory.driveId}/view`;
            }
            return memory.link || '#';
        }

        function getImageThumbnail(driveId) {
            return `https://lh3.googleusercontent.com/d/${driveId}`;
        }

        function getImageFullSize(driveId) {
            return `https://lh3.googleusercontent.com/d/${driveId}=s1600`;
        }

        function getDriveEmbedLink(driveId) {
            return `https://drive.google.com/file/d/${driveId}/preview`;
        }

        function getArchiveEmbedLink(archiveUrl) {
            const match = archiveUrl.match(/archive\.org\/details\/([^\/\?]+)/);
            if (match) {
                return `https://archive.org/embed/${match[1]}`;
            }
            return archiveUrl;
        }

        // ═══════════════════════════════════════════════════════════
        //                    LIGHTBOX
        // ═══════════════════════════════════════════════════════════
        function openLightbox(index) {
            const memory = memoriesData[index];
            if (!memory || memory.type === 'text') return;

            const lightbox = document.getElementById('lightbox');
            const mediaContainer = document.getElementById('lightboxMedia');
            const infoContainer = document.getElementById('lightboxInfo');
            const externalBtn = document.getElementById('lightboxExternal');

            // Set external link
            externalBtn.href = getExternalLink(memory);

            let mediaHTML = '';

            // 📷 صورة
            if (memory.type === 'image') {
                mediaHTML = `
                    <img src="${getImageFullSize(memory.driveId)}" 
                         alt="${memory.title}"
                         onload="this.style.opacity=1"
                         style="opacity: 0; transition: opacity 0.3s ease;"
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/800x600/1a1a2e/e91e63?text=📷'">
                `;
            }
            // 🎬 فيديو
            else if (memory.type === 'video') {
                if (memory.driveId) {
                    mediaHTML = `
                        <iframe src="${getDriveEmbedLink(memory.driveId)}" 
                                allow="autoplay; encrypted-media" 
                                allowfullscreen>
                        </iframe>
                    `;
                }
            }
            // 🎵 صوت
            else if (memory.type === 'audio') {
                // Google Drive
                if (memory.driveId) {
                    mediaHTML = `
                        <div class="lightbox-audio-container">
                            <div class="lightbox-audio-icon">🎵</div>
                            <iframe src="${getDriveEmbedLink(memory.driveId)}" 
                                    width="400" 
                                    height="100"
                                    allow="autoplay">
                            </iframe>
                        </div>
                    `;
                }
                // Archive.org
                else if (memory.link && memory.link.includes('archive.org')) {
                    mediaHTML = `
                        <div class="lightbox-audio-container">
                            <div class="lightbox-audio-icon">🎵</div>
                            <iframe src="${getArchiveEmbedLink(memory.link)}" 
                                    width="400" 
                                    height="140" 
                                    frameborder="0">
                            </iframe>
                        </div>
                    `;
                }
            }

            mediaContainer.innerHTML = mediaHTML;

            // Info
            const dateHTML = memory.date && memory.date.trim() !== '' 
                ? `<span class="lightbox-date">📅 ${memory.date}</span>` 
                : '';

            infoContainer.innerHTML = `
                ${dateHTML}
                <h3 class="lightbox-title">${memory.emoji || ''} ${memory.title}</h3>
                <p class="lightbox-description">${memory.description}</p>
            `;

            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const mediaContainer = document.getElementById('lightboxMedia');
            
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            
            setTimeout(() => {
                mediaContainer.innerHTML = '';
            }, 300);
        }

        function closeLightboxOnOverlay(event) {
            if (event.target.id === 'lightbox') {
                closeLightbox();
            }
        }

        // Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // ═══════════════════════════════════════════════════════════
        //                    Generate Card HTML
        // ═══════════════════════════════════════════════════════════
        function generateMemoryCardHTML(memory, index) {
            let mediaHTML = '';

            if (memory.type === 'image') {
                mediaHTML = `
                    <div class="memory-media" onclick="openLightbox(${index})">
                        <img src="${getImageThumbnail(memory.driveId)}" 
                             alt="${memory.title}" 
                             loading="lazy"
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300/1a1a2e/e91e63?text=📷'">
                        <div class="click-overlay"><span>🔍</span></div>
                        <span class="memory-type-badge">📷 صورة</span>
                    </div>
                `;
            }
            else if (memory.type === 'video') {
                mediaHTML = `
                    <div class="memory-media" onclick="openLightbox(${index})">
                        <div class="video-placeholder">
                            <span>🎬</span>
                            <p class="placeholder-text">اضغط للمشاهدة</p>
                        </div>
                        <div class="click-overlay"><span>▶️</span></div>
                        <span class="memory-type-badge">🎬 فيديو</span>
                    </div>
                `;
            }
            else if (memory.type === 'audio') {
                mediaHTML = `
                    <div class="memory-media" onclick="openLightbox(${index})">
                        <div class="audio-placeholder">
                            <span>🎵</span>
                            <p class="placeholder-text">اضغط للاستماع</p>
                        </div>
                        <div class="click-overlay"><span>🎧</span></div>
                        <span class="memory-type-badge">🎵 تسجيل</span>
                    </div>
                `;
            }
            else if (memory.type === 'text') {
                mediaHTML = `
                    <div class="text-card-icon">
                        <span>${memory.emoji || '💭'}</span>
                    </div>
                `;
            }

            const dateHTML = memory.date && memory.date.trim() !== '' 
                ? `<span class="memory-date">📅 ${memory.date}</span>` 
                : '';

            return `
                ${mediaHTML}
                <div class="memory-info">
                    <div class="memory-header">
                        <span class="memory-emoji">${memory.emoji || '💕'}</span>
                        <div class="memory-meta">
                            ${dateHTML}
                            <h3 class="memory-title">${memory.title}</h3>
                        </div>
                    </div>
                    <p class="memory-description">${memory.description}</p>
                </div>
            `;
        }

        // ═══════════════════════════════════════════════════════════
        //                    Render Memories
        // ═══════════════════════════════════════════════════════════
        function renderMemories(filter = 'all') {
            const grid = document.getElementById('memoriesGrid');
            grid.innerHTML = '';

            if (typeof memoriesData === 'undefined' || memoriesData.length === 0) {
                grid.innerHTML = `
                    <div class="memories-empty">
                        <div class="memories-empty-icon">📭</div>
                        <h3>لسه مفيش ذكريات</h3>
                        <p>قريب هضيف ذكرياتنا الحلوة هنا 💕</p>
                    </div>
                `;
                return;
            }

            const filteredData = filter === 'all' 
                ? memoriesData 
                : memoriesData.filter(m => m.type === filter);

            if (filteredData.length === 0) {
                const typeNames = {
                    'image': 'صور',
                    'video': 'فيديوهات',
                    'audio': 'تسجيلات',
                    'text': 'كلام'
                };
                grid.innerHTML = `
                    <div class="memories-empty">
                        <div class="memories-empty-icon">🔍</div>
                        <h3>مفيش ${typeNames[filter] || filter} هنا</h3>
                        <p>جرب فلتر تاني 💕</p>
                    </div>
                `;
                return;
            }

            filteredData.forEach((memory, index) => {
                const originalIndex = memoriesData.indexOf(memory);
                const card = document.createElement('div');
                card.className = memory.type === 'text' ? 'memory-card text-only' : 'memory-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = generateMemoryCardHTML(memory, originalIndex);
                grid.appendChild(card);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //                    Filter
        // ═══════════════════════════════════════════════════════════
        function filterMemories(filter, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMemories(filter);
        }

        // ═══════════════════════════════════════════════════════════
        //                    Stats
        // ═══════════════════════════════════════════════════════════
        function updateStats() {
            const stats = document.getElementById('memoriesStats');
            
            if (typeof memoriesData === 'undefined' || memoriesData.length === 0) {
                stats.innerHTML = '';
                return;
            }

            const total = memoriesData.length;
            const images = memoriesData.filter(m => m.type === 'image').length;
            const videos = memoriesData.filter(m => m.type === 'video').length;
            const audios = memoriesData.filter(m => m.type === 'audio').length;
            const texts = memoriesData.filter(m => m.type === 'text').length;

            stats.innerHTML = `
                <div class="stat-item">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">📚 إجمالي</div>
                </div>
                ${images > 0 ? `<div class="stat-item"><div class="stat-number">${images}</div><div class="stat-label">📷 صور</div></div>` : ''}
                ${videos > 0 ? `<div class="stat-item"><div class="stat-number">${videos}</div><div class="stat-label">🎬 فيديو</div></div>` : ''}
                ${audios > 0 ? `<div class="stat-item"><div class="stat-number">${audios}</div><div class="stat-label">🎵 تسجيلات</div></div>` : ''}
                ${texts > 0 ? `<div class="stat-item"><div class="stat-number">${texts}</div><div class="stat-label">📝 كلام</div></div>` : ''}
            `;
        }

        // ═══════════════════════════════════════════════════════════
        //                    Initialize
        // ═══════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            renderMemories();
        });
    </script>
</body>
</html>
